name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          if (Test-Path streamlit_app/requirements.txt) { pip install -r streamlit_app/requirements.txt }
        shell: pwsh

      - name: Lint with ruff
        run: ruff check streamlit_app --output-format=github

      - name: Compile check (syntax errors)
        run: python -m compileall streamlit_app -q
